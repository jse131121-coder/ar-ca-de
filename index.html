<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE SOCIAL</title>
    <style>
        :root { --p-hue: 260; --p: hsl(var(--p-hue), 60%, 60%); --bg: #f8f9fa; --white: #fff; --gray: #94a3b8; --me: hsl(var(--p-hue), 80%, 85%); --you: #ffebe6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #e2e8f0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        #app { width: 100%; max-width: 430px; background: var(--white); display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        
        header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; background: #fff; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--p); letter-spacing: -1px; }

        main { flex: 1; overflow-y: auto; padding-bottom: 85px; background: var(--bg); position: relative; }
        .page { display: none; padding: 16px; min-height: 100%; }
        .page.active { display: block; }

        /* Feed Card */
        .post { background: #fff; border-radius: 22px; padding: 18px; margin-bottom: 16px; border: 1px solid #eee; }
        .post-header { display: flex; align-items: center; margin-bottom: 10px; }
        .p-img-round { width: 40px; height: 40px; border-radius: 50%; background: #eee; margin-right: 12px; object-fit: cover; }
        .post-title { font-weight: 800; font-size: 1.1rem; margin: 8px 0; }
        .post-img { width: 100%; border-radius: 14px; margin-top: 10px; display: block; }

        /* Agency (User List) */
        .u-card { display: flex; align-items: center; background: #fff; padding: 15px; border-radius: 18px; margin-bottom: 10px; border: 1px solid #eee; cursor: pointer; }
        .u-img-sq { width: 55px; height: 55px; border-radius: 15px; background: #eee; margin-right: 15px; object-fit: cover; }

        /* DM Chat Page */
        #page-dm { padding: 0; display: flex; flex-direction: column; background: #fafafa; }
        .dm-header { padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #eee; background: #fff; font-size: 0.9rem; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { display: flex; gap: 8px; max-width: 85%; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; font-size: 0.9rem; position: relative; }
        .me .msg-bubble { background: var(--me); border-bottom-right-radius: 2px; }
        .you .msg-bubble { background: var(--you); border-bottom-left-radius: 2px; border: 1px solid #ffdcd3; }
        .chat-input-bar { padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-input-bar input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #eee; outline: none; }

        /* Settings Page (No DM here!) */
        .set-card { background: #fff; padding: 20px; border-radius: 20px; border: 1px solid #eee; margin-bottom: 15px; }
        .set-card h4 { font-size: 0.8rem; color: var(--p); margin-bottom: 15px; letter-spacing: 1px; }
        .set-card input, .set-card textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #eee; outline: none; }

        /* --- Write Page (Slide-up Window) --- */
        #write-window { 
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 92%; 
            background: #fff; z-index: 500; border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1); transition: bottom 0.4s cubic-bezier(0.17, 0.84, 0.44, 1);
            display: flex; flex-direction: column; padding: 20px;
        }
        #write-window.open { bottom: 0; }
        .win-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #post-img-preview { width: 100%; height: 200px; background: #f3f5f7; border-radius: 15px; object-fit: cover; margin-bottom: 15px; display: none; }
        .img-placeholder { width: 100%; height: 150px; border: 2px dashed #eee; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--gray); font-size: 0.9rem; }
        #post-content { width: 100%; flex: 1; border: none; outline: none; font-size: 1rem; resize: none; margin-top: 10px; }

        /* Floating Button */
        .float-write-btn { position: absolute; bottom: 100px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--p), #a78bfa); color: #fff; border: none; font-size: 30px; cursor: pointer; z-index: 200; box-shadow: 0 10px 20px rgba(93, 62, 188, 0.3); }

        /* Nav */
        nav { position: absolute; bottom: 0; width: 100%; height: 85px; background: #fff; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-around; align-items: center; z-index: 150; }
        nav button { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        nav button.active { color: var(--p); font-weight: 800; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo">ARCADE</div>
        <button style="border:none; background:none; color:var(--p); font-weight:bold; cursor:pointer;" onclick="switchUser()">LOGIN</button>
    </header>

    <main id="main-area">
        <section id="page-feed" class="page active"></section>
        <section id="page-explore" class="page"><div id="explore-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:3px;"></div></section>
        <section id="page-agency" class="page"></section>
        <section id="page-dm" class="page">
            <div class="dm-header" id="target-name">상대를 선택하세요</div>
            <div class="chat-box" id="chat-box"></div>
            <div class="chat-input-bar">
                <input type="text" id="dm-input" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) sendDM()">
                <button onclick="sendDM()" style="border:none; background:none; color:var(--p); font-weight:bold;">보내기</button>
            </div>
        </section>
        <section id="page-setting" class="page">
            <div class="set-card">
                <h4>PROFILE</h4>
                <input type="text" id="set-name" placeholder="이름">
                <input type="text" id="set-id" placeholder="아이디">
                <textarea id="set-status" placeholder="상태 메시지"></textarea>
                <p style="font-size:0.7rem; margin-bottom:5px;">Theme Hue</p>
                <input type="range" id="set-hue" min="0" max="360" oninput="updateHue(this.value)">
                <button onclick="saveProfile()" style="width:100%; padding:12px; background:var(--p); color:#fff; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">저장하기</button>
            </div>
        </section>
    </main>

    <div id="write-window">
        <div class="win-header">
            <button onclick="toggleWrite(false)" style="background:none; border:none; color:#888; font-size:1.5rem;">×</button>
            <b>새 게시물 작성</b>
            <button onclick="completePost()" style="background:var(--p); color:#fff; border:none; padding:6px 15px; border-radius:20px; font-weight:bold;">공유</button>
        </div>
        <div class="img-placeholder" id="placeholder" onclick="document.getElementById('file-in').click()">사진 추가하기</div>
        <img id="post-img-preview">
        <input type="file" id="file-in" style="display:none" onchange="previewImg(this)">
        <input type="text" id="post-title-in" placeholder="제목을 입력하세요..." style="width:100%; padding:15px 0; border:none; border-bottom:1px solid #eee; font-size:1.1rem; font-weight:bold; outline:none;">
        <textarea id="post-content" placeholder="무슨 생각을 하고 계신가요?"></textarea>
    </div>

    <button class="float-write-btn" id="float-btn" onclick="toggleWrite(true)">+</button>

    <nav>
        <button onclick="showPage('feed')" id="nav-feed" class="active">🏛️<br>Feed</button>
        <button onclick="showPage('explore')" id="nav-explore">✨<br>Explore</button>
        <button onclick="showPage('agency')" id="nav-agency">🪐<br>Agency</button>
        <button onclick="showPage('dm')" id="nav-dm">💬<br>DM</button>
        <button onclick="showPage('setting')" id="nav-setting">⚙️<br>Setting</button>
    </nav>
</div>

<script>
    // --- DB & State ---
    let accounts = JSON.parse(localStorage.getItem('arc_accs')) || [{id:'ARCADE', pw:'01024773752'}];
    let curId = localStorage.getItem('arc_cur') || 'ARCADE';
    let targetId = null;
    let tempImg = "";

    let db = JSON.parse(localStorage.getItem('arc_db')) || {
        posts: [{id:1, author:'ARCADE', title:'첫 인사!', content:'ARCADE에 오신 것을 환영해요.', img:'https://picsum.photos/400/300', date:'2026.03.18'}],
        chats: [],
        profiles: { 'ARCADE': {name:'아케이드', id:'@arcade.buzy', hue:260} }
    };
    function save() { localStorage.setItem('arc_db', JSON.stringify(db)); }

    // --- Navigation ---
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        document.getElementById('nav-'+id).classList.add('active');
        document.getElementById('float-btn').style.display = (id === 'feed') ? 'block' : 'none';
        render();
    }

    // --- Write Window ---
    function toggleWrite(open) {
        document.getElementById('write-window').classList.toggle('open', open);
    }

    function previewImg(input) {
        if(input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                tempImg = e.target.result;
                const img = document.getElementById('post-img-preview');
                img.src = tempImg; img.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function completePost() {
        const title = document.getElementById('post-title-in').value;
        const content = document.getElementById('post-content').value;
        if(!title || !content) return alert("내용을 채워주세요!");
        db.posts.unshift({id:Date.now(), author:curId, title, content, img:tempImg, date:new Date().toLocaleDateString()});
        save();
        // Reset & Close
        document.getElementById('post-title-in').value = "";
        document.getElementById('post-content').value = "";
        document.getElementById('post-img-preview').style.display = "none";
        document.getElementById('placeholder').style.display = "flex";
        toggleWrite(false);
        render();
    }

    // --- DM Logic ---
    function startChat(id) { targetId = id; showPage('dm'); }
    function sendDM() {
        const input = document.getElementById('dm-input');
        if(!input.value || !targetId) return;
        db.chats.push({from:curId, to:targetId, text:input.value, time:new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
        save(); input.value = ''; render();
    }

    // --- Profile & Theme ---
    function updateHue(v) { document.documentElement.style.setProperty('--p-hue', v); }
    function saveProfile() {
        db.profiles[curId] = { ...db.profiles[curId], name: document.getElementById('set-name').value, id: document.getElementById('set-id').value, status: document.getElementById('set-status').value, hue: document.getElementById('set-hue').value };
        save(); alert("정보가 저장되었습니다!"); render();
    }

    function switchUser() {
        const id = prompt("ID"); const pw = prompt("PW");
        const found = accounts.find(a => a.id === id && a.pw === pw);
        if(found) { curId = id; localStorage.setItem('arc_cur', id); location.reload(); } else { alert("로그인 실패"); }
    }

    // --- Render ---
    function render() {
        const my = db.profiles[curId] || {name:curId, hue:260};
        updateHue(my.hue);

        // Feed
        document.getElementById('page-feed').innerHTML = db.posts.map(p => `
            <div class="post">
                <div class="post-header" onclick="startChat('${p.author}')">
                    <img src="https://i.pravatar.cc/100?u=${p.author}" class="p-img-round">
                    <b>${p.author}</b>
                </div>
                <b class="post-title">${p.title}</b>
                <p style="font-size:0.95rem; color:#444;">${p.content}</p>
                ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
            </div>`).join('');

        // Explore
        document.getElementById('explore-grid').innerHTML = db.posts.map(p => `
            <div class="grid-item" style="aspect-ratio:1/1; background:#eee; position:relative;">
                <img src="${p.img || ''}" style="width:100%; height:100%; object-fit:cover;">
            </div>`).join('');

        // Agency
        document.getElementById('page-agency').innerHTML = Object.keys(db.profiles).map(k => `
            <div class="u-card" onclick="startChat('${k}')">
                <img src="https://i.pravatar.cc/100?u=${k}" class="u-img-sq">
                <div><b>${db.profiles[k].name}</b><br><span style="color:#888;">${db.profiles[k].id}</span></div>
            </div>`).join('');

        // DM
        if(targetId && document.getElementById('page-dm').classList.contains('active')) {
            const targetProfile = db.profiles[targetId] || {name:targetId};
            document.getElementById('target-name').innerText = targetProfile.name + " 님";
            const chatLog = db.chats.filter(c => (c.from === curId && c.to === targetId) || (c.from === targetId && c.to === curId));
            document.getElementById('chat-box').innerHTML = chatLog.map(c => `
                <div class="msg ${c.from === curId ? 'me' : 'you'}">
                    ${c.from !== curId ? `<img src="https://i.pravatar.cc/100?u=${c.from}" style="width:30px; height:30px; border-radius:50%;">` : ''}
                    <div class="msg-bubble">${c.text}</div>
                </div>`).join('');
            const cb = document.getElementById('chat-box'); cb.scrollTop = cb.scrollHeight;
        }

        // Setting Sync
        if(document.getElementById('page-setting').classList.contains('active')) {
            document.getElementById('set-name').value = my.name || '';
            document.getElementById('set-id').value = my.id || '';
            document.getElementById('set-status').value = my.status || '';
            document.getElementById('set-hue').value = my.hue || 260;
        }
    }
    render();
</script>
</body>
</html>

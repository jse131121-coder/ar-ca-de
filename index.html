<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE SOCIAL</title>
    <style>
        :root { --p-hue: 260; --p: hsl(var(--p-hue), 60%, 60%); --bg: #f8fafc; --white: #fff; --gray: #94a3b8; --me: hsl(var(--p-hue), 80%, 85%); --you: #ffebe6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #e2e8f0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 430px; background: var(--white); display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        
        /* Header */
        header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; background: #fff; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--p); letter-spacing: -1px; }

        /* Main Content */
        main { flex: 1; overflow-y: auto; padding-bottom: 90px; background: var(--bg); position: relative; }
        .page { display: none; padding: 16px; min-height: 100%; }
        .page.active { display: block; }

        /* Posts (Feed) */
        .post { background: #fff; border-radius: 22px; padding: 18px; margin-bottom: 16px; border: 1px solid #eee; }
        .post-header { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .p-img { width: 40px; height: 40px; border-radius: 50%; background: #eee; margin-right: 12px; object-fit: cover; }
        .post-title { font-weight: 800; font-size: 1.1rem; color: #1e293b; margin: 5px 0; }
        .post-img { width: 100%; border-radius: 14px; margin-top: 10px; border: 1px solid #f1f5f9; }

        /* Agency List */
        .u-card { display: flex; align-items: center; background: #fff; padding: 16px; border-radius: 18px; margin-bottom: 10px; border: 1px solid #eee; cursor: pointer; }
        .u-img-sq { width: 55px; height: 55px; border-radius: 16px; background: #eee; margin-right: 15px; object-fit: cover; }

        /* DM Chat */
        #page-dm { padding: 0; display: flex; flex-direction: column; background: #fff; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; font-size: 0.9rem; max-width: 80%; line-height: 1.4; }
        .me { align-self: flex-end; background: var(--me); border-bottom-right-radius: 2px; }
        .you { align-self: flex-start; background: var(--you); border-bottom-left-radius: 2px; border: 1px solid #ffdcd3; }

        /* --- SETTING (진짜 구현됨) --- */
        .set-wrap { display: flex; flex-direction: column; gap: 15px; }
        .set-p-area { align-self: center; text-align: center; margin-bottom: 10px; }
        .set-p-circle { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--p); overflow: hidden; margin-bottom: 8px; cursor: pointer; position: relative; }
        .set-p-circle img { width: 100%; height: 100%; object-fit: cover; }
        .set-input-group { background: #fff; padding: 15px; border-radius: 18px; border: 1px solid #eee; }
        .set-input-group label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--p); margin-bottom: 6px; }
        .set-input-group input, .set-input-group textarea { width: 100%; border: none; background: #f8fafc; padding: 10px; border-radius: 10px; font-size: 0.95rem; outline: none; }

        /* --- WRITE SLIDE-UP WINDOW --- */
        #write-win { 
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 92%; 
            background: #fff; z-index: 500; border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.17, 0.84, 0.44, 1);
            display: flex; flex-direction: column; padding: 25px;
        }
        #write-win.open { bottom: 0; }
        .win-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .write-img-slot { width: 100%; height: 200px; background: #f1f5f9; border: 2px dashed #cbd5e1; border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
        .write-img-slot img { width: 100%; height: 100%; object-fit: cover; }

        /* Bottom Nav & Floating */
        .float-btn { position: absolute; bottom: 105px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--p), #a78bfa); color: #fff; border: none; font-size: 30px; cursor: pointer; z-index: 200; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        nav { position: absolute; bottom: 0; width: 100%; height: 85px; background: #fff; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-around; align-items: center; z-index: 150; }
        nav button { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
        nav button.active { color: var(--p); font-weight: 800; }
    </style>
</head>
<body>

<div id="app">
    <header><div class="logo">ARCADE</div></header>

    <main id="main-scroll">
        <section id="page-feed" class="page active"></section>
        <section id="page-explore" class="page"><div id="explore-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:3px;"></div></section>
        <section id="page-agency" class="page"></section>
        <section id="page-dm" class="page">
            <div id="dm-target" style="padding:15px; text-align:center; font-weight:bold; border-bottom:1px solid #eee;">상대를 선택하세요</div>
            <div class="chat-box" id="chat-box"></div>
            <div style="padding:15px; display:flex; gap:10px; background:#fff; border-top:1px solid #eee;">
                <input type="text" id="dm-input" placeholder="메시지 입력..." style="flex:1; padding:12px; border-radius:20px; border:1px solid #eee; outline:none;">
                <button onclick="sendDM()" style="border:none; background:none; color:var(--p); font-weight:bold;">보내기</button>
            </div>
        </section>

        <section id="page-setting" class="page">
            <div class="set-wrap">
                <div class="set-p-area">
                    <div class="set-p-circle" onclick="document.getElementById('set-img-file').click()">
                        <img id="set-img-preview" src="https://i.pravatar.cc/150?u=me">
                    </div>
                    <input type="file" id="set-img-file" style="display:none;" onchange="updateProfileImg(this)">
                    <span style="font-size:0.7rem; color:var(--gray);">프로필 사진 변경</span>
                </div>
                <div class="set-input-group"><label>NAME</label><input type="text" id="set-name" placeholder="이름 입력"></div>
                <div class="set-input-group"><label>ID</label><input type="text" id="set-id" placeholder="@아이디 입력"></div>
                <div class="set-input-group"><label>STATUS</label><textarea id="set-status" placeholder="상태 메시지"></textarea></div>
                <div class="set-input-group"><label>THEME (HUE)</label><input type="range" id="set-hue" min="0" max="360" oninput="changeTheme(this.value)"></div>
                <button onclick="saveProfile()" style="width:100%; padding:15px; background:var(--p); color:#fff; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">저장하기</button>
            </div>
        </section>
    </main>

    <div id="write-win">
        <div class="win-header">
            <button onclick="toggleWrite(false)" style="background:none; border:none; color:#94a3b8; font-size:1.5rem;">×</button>
            <b style="font-size:1.1rem;">새 게시물 작성</b>
            <button onclick="submitPost()" style="background:var(--p); color:#fff; border:none; padding:7px 20px; border-radius:20px; font-weight:bold;">공유</button>
        </div>
        <div class="write-img-slot" onclick="document.getElementById('post-file').click()">
            <img id="post-img-preview" style="display:none;">
            <span id="post-img-text">📸 사진 추가</span>
        </div>
        <input type="file" id="post-file" style="display:none;" onchange="previewPostImg(this)">
        <input type="text" id="post-title-in" placeholder="제목을 입력하세요" style="width:100%; padding:15px 0; border:none; border-bottom:1px solid #eee; font-size:1.2rem; font-weight:800; outline:none;">
        <textarea id="post-content-in" placeholder="내용을 입력하세요..." style="width:100%; flex:1; border:none; outline:none; font-size:1rem; resize:none; margin-top:15px;"></textarea>
    </div>

    <button class="float-btn" id="write-trigger" onclick="toggleWrite(true)">+</button>

    <nav>
        <button onclick="showPage('feed')" id="nav-feed" class="active">🏛️<br>Feed</button>
        <button onclick="showPage('explore')" id="nav-explore">✨<br>Explore</button>
        <button onclick="showPage('agency')" id="nav-agency">🪐<br>Agency</button>
        <button onclick="showPage('dm')" id="nav-dm">💬<br>DM</button>
        <button onclick="showPage('setting')" id="nav-setting">⚙️<br>Setting</button>
    </nav>
</div>

<script>
    let curId = 'ME'; let targetId = null; let tempPostImg = ""; let tempProfileImg = "https://i.pravatar.cc/150?u=me";
    let db = JSON.parse(localStorage.getItem('arc_final')) || {
        posts: [{author:'ARCADE', title:'환영합니다!', content:'이곳은 당신의 아케이드입니다.', img:'https://picsum.photos/400/300'}],
        chats: [],
        profiles: { 'ARCADE': {name:'아케이드', id:'@arcade.buzy', img:'https://i.pravatar.cc/100?u=1'}, 'ME': {name:'사용자', id:'@me', img:tempProfileImg, status:'반가워요!', hue:260} }
    };
    function save() { localStorage.setItem('arc_final', JSON.stringify(db)); }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        document.getElementById('nav-'+id).classList.add('active');
        document.getElementById('write-trigger').style.display = (id === 'feed') ? 'block' : 'none';
        render();
    }

    // --- Profile Logic ---
    function updateProfileImg(input) {
        if(input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { tempProfileImg = e.target.result; document.getElementById('set-img-preview').src = tempProfileImg; };
            reader.readAsDataURL(input.files[0]);
        }
    }
    function saveProfile() {
        db.profiles['ME'] = { name: document.getElementById('set-name').value, id: document.getElementById('set-id').value, img: tempProfileImg, status: document.getElementById('set-status').value, hue: document.getElementById('set-hue').value };
        save(); alert("저장 완료!"); render();
    }
    function changeTheme(v) { document.documentElement.style.setProperty('--p-hue', v); }

    // --- Post Logic ---
    function toggleWrite(open) { document.getElementById('write-win').classList.toggle('open', open); }
    function previewPostImg(input) {
        if(input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { tempPostImg = e.target.result; document.getElementById('post-img-preview').src = tempPostImg; document.getElementById('post-img-preview').style.display='block'; document.getElementById('post-img-text').style.display='none'; };
            reader.readAsDataURL(input.files[0]);
        }
    }
    function submitPost() {
        const title = document.getElementById('post-title-in').value;
        const content = document.getElementById('post-content-in').value;
        if(!title) return;
        db.posts.unshift({author:db.profiles['ME'].name, title, content, img:tempPostImg});
        save(); location.reload();
    }

    // --- DM Logic ---
    function startChat(id) { targetId = id; showPage('dm'); }
    function sendDM() {
        const val = document.getElementById('dm-input').value;
        if(!val || !targetId) return;
        db.chats.push({from:'ME', to:targetId, text:val});
        save(); document.getElementById('dm-input').value = ''; render();
    }

    function render() {
        const my = db.profiles['ME'];
        changeTheme(my.hue || 260);

        // Feed
        document.getElementById('page-feed').innerHTML = db.posts.map(p => `
            <div class="post">
                <div class="post-header" onclick="startChat('${p.author}')">
                    <img src="${p.author === my.name ? my.img : 'https://i.pravatar.cc/100?u='+p.author}" class="p-img">
                    <b>${p.author}</b>
                </div>
                <b class="post-title">${p.title}</b>
                <p style="font-size:0.95rem; color:#444;">${p.content}</p>
                ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
            </div>`).join('');

        // Agency
        document.getElementById('page-agency').innerHTML = Object.keys(db.profiles).map(k => `
            <div class="u-card" onclick="startChat('${k}')">
                <img src="${db.profiles[k].img}" class="u-img-sq">
                <div><b>${db.profiles[k].name}</b><br><span style="color:#888; font-size:0.8rem;">${db.profiles[k].id}</span></div>
            </div>`).join('');

        // DM
        if(targetId && document.getElementById('page-dm').classList.contains('active')) {
            document.getElementById('dm-target').innerText = db.profiles[targetId].name + " 님";
            const logs = db.chats.filter(c => (c.from === 'ME' && c.to === targetId) || (c.from === targetId && c.to === 'ME'));
            document.getElementById('chat-box').innerHTML = logs.map(c => `<div class="msg-bubble ${c.from === 'ME' ? 'me' : 'you'}">${c.text}</div>`).join('');
            const cb = document.getElementById('chat-box'); cb.scrollTop = cb.scrollHeight;
        }

        // Setting Sync
        document.getElementById('set-name').value = my.name;
        document.getElementById('set-id').value = my.id;
        document.getElementById('set-status').value = my.status;
        document.getElementById('set-hue').value = my.hue;
        document.getElementById('set-img-preview').src = my.img;
    }
    render();
</script>
</body>
</html>

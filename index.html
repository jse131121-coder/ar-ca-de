<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE SOCIAL - MASTER</title>
    <style>
        :root { --p-hue: 260; --p: hsl(var(--p-hue), 60%, 60%); --bg: #f3f5f7; --white: #fff; --gray: #94a3b8; --me: hsl(var(--p-hue), 80%, 85%); --you: #ffebe6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background: #cbd5e1; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 430px; background: var(--white); display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        
        /* Header */
        header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; background: #fff; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--p); cursor: pointer; }
        
        /* Pages */
        main { flex: 1; overflow-y: auto; padding-bottom: 80px; background: var(--bg); display: flex; flex-direction: column; }
        .page { display: none; padding: 16px; flex: 1; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Feed & Profile Design */
        .post { background: #fff; border-radius: 20px; padding: 18px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .post-header { display: flex; align-items: center; margin-bottom: 12px; cursor: pointer; }
        .p-img { width: 42px; height: 42px; border-radius: 50%; background: #e2e8f0; margin-right: 12px; object-fit: cover; }
        .post-title { font-weight: 800; font-size: 1.1rem; margin: 10px 0; display: block; }
        .post-img { width: 100%; border-radius: 12px; margin-top: 10px; display: block; }
        .comment-sec { margin-top: 10px; padding-top: 10px; border-top: 1px dotted #eee; font-size: 0.8rem; }

        /* Explore Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #eee; position: relative; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* User List & Profile (사진 2번 느낌) */
        .u-card { display: flex; align-items: center; background: #fff; padding: 15px; border-radius: 16px; margin-bottom: 10px; cursor: pointer; border: 1px solid #eee; }
        .u-img-sq { width: 55px; height: 55px; border-radius: 15px; margin-right: 15px; background: #eee; }
        .prof-header { text-align: center; padding: 30px 0; background: #fff; border-radius: 0 0 30px 30px; margin: -16px -16px 20px -16px; border-bottom: 1px solid #eee; }
        .prof-main-img { width: 100px; height: 100px; border-radius: 35px; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* DM Chat */
        #page-dm { padding: 0; display: flex; flex-direction: column; background: #fff; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { display: flex; gap: 8px; max-width: 80%; position: relative; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .me .msg-bubble { background: var(--me); border-bottom-right-radius: 2px; }
        .you .msg-bubble { background: var(--you); border-bottom-left-radius: 2px; border: 1px solid #ffdcd3; }
        .chat-bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 8px; background: #fff; }
        .chat-bar input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #eee; outline: none; }

        /* UI */
        .float-btn { position: absolute; bottom: 95px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--p), #a78bfa); color: #fff; border: none; font-size: 30px; cursor: pointer; z-index: 200; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        nav { position: absolute; bottom: 0; width: 100%; height: 80px; background: #fff; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-around; align-items: center; z-index: 150; }
        nav button { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        nav button.active { color: var(--p); font-weight: 800; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo" onclick="showPage('feed')">ARCADE</div>
        <button style="border:none; background:none; font-weight:bold; color:var(--p); cursor:pointer;" onclick="switchUser()">PLAY (LOGIN)</button>
    </header>

    <main id="main-view">
        <section id="page-feed" class="page active"></section>
        <section id="page-explore" class="page"><div class="grid" id="explore-grid"></div></section>
        <section id="page-agency" class="page"></section>
        <section id="page-dm" class="page">
            <div id="chat-target" style="padding:15px; font-weight:bold; border-bottom:1px solid #eee; text-align:center;">대상 선택</div>
            <div class="chat-box" id="chat-box"></div>
            <div class="chat-bar">
                <button onclick="sendMedia('📸')" style="border:none; background:none; cursor:pointer;">🖼️</button>
                <input type="text" id="chat-input" placeholder="메시지..." onkeypress="if(event.keyCode==13) sendMsg()">
                <button onclick="sendMsg()" style="border:none; background:none; color:var(--p); font-weight:bold;">전송</button>
            </div>
        </section>
        <section id="page-profile" class="page"></section>
        <section id="page-setting" class="page">
            <div style="background:#fff; padding:20px; border-radius:20px; border:1px solid #eee;">
                <h3 style="margin-bottom:15px; font-size:0.9rem;">MY SETTING</h3>
                <input type="text" id="set-name" placeholder="이름" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #eee;">
                <textarea id="set-status" placeholder="상태 메시지" style="width:100%; padding:10px; border-radius:10px; border:1px solid #eee; height:60px;"></textarea>
                <p style="font-size:0.7rem; margin:10px 0 5px;">채팅 테마 (Slide)</p>
                <input type="range" id="set-hue" min="0" max="360" style="width:100%;" oninput="updateHue(this.value)">
                <button onclick="saveProfile()" style="width:100%; padding:12px; background:var(--p); color:#fff; border:none; border-radius:10px; font-weight:bold; margin-top:15px;">저장</button>
            </div>
        </section>
    </main>

    <input type="file" id="file-input" style="display:none;" onchange="handleFile(this)">
    <button class="float-btn" id="write-btn" onclick="openWrite()">+</button>

    <nav>
        <button onclick="showPage('feed')" id="nav-feed" class="active">🏛️<br>Feed</button>
        <button onclick="showPage('explore')" id="nav-explore">✨<br>Explore</button>
        <button onclick="showPage('agency')" id="nav-agency">🪐<br>Agency</button>
        <button onclick="showPage('dm')" id="nav-dm">💬<br>DM</button>
        <button onclick="showPage('setting')" id="nav-setting">⚙️<br>Setting</button>
    </nav>
</div>

<script>
    // --- DB & 상태 ---
    let accounts = JSON.parse(localStorage.getItem('arc_accs')) || [{id:'ARCADE', pw:'01024773752'}];
    let curId = localStorage.getItem('arc_cur') || 'ARCADE';
    let targetId = null;
    let db = JSON.parse(localStorage.getItem('arc_db')) || {
        posts: [{id:1, author:'ARCADE', title:'반갑습니다!', content:'나만의 아케이드 소셜을 시작해보세요.', img:'', comments:[]}],
        chats: [],
        profiles: { 'ARCADE': {name:'아케이드', id:'@arcade.buzy', status:'Welcome!', hue:260, following:[]} }
    };
    function save() { localStorage.setItem('arc_db', JSON.stringify(db)); }

    // --- 네비게이션 ---
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        if(id !== 'profile') document.getElementById('nav-'+id).classList.add('active');
        document.getElementById('write-btn').style.display = (id === 'feed') ? 'block' : 'none';
        render();
    }

    // --- 기능 ---
    function openWrite() { document.getElementById('file-input').click(); }
    function handleFile(input) {
        if(!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const title = prompt("제목(두껍게)"); const content = prompt("내용");
            if(title && content) {
                db.posts.unshift({id:Date.now(), author:curId, title, content, img:e.target.result, comments:[]});
                save(); render();
            }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function addComment(postId) {
        const text = prompt("댓글을 입력하세요");
        if(!text) return;
        const post = db.posts.find(p => p.id === postId);
        post.comments.push({author:curId, text});
        save(); render();
    }

    function viewProfile(id) {
        targetId = id;
        const u = db.profiles[id] || {name:id, id:'@'+id};
        const pList = db.posts.filter(p => p.author === id);
        const isMe = curId === id;
        document.getElementById('page-profile').innerHTML = `
            <div class="prof-header">
                <img src="https://i.pravatar.cc/150?u=${id}" class="prof-main-img"><br>
                <b style="font-size:1.2rem;">${u.name}</b><br><span style="color:#888;">${u.id}</span>
                <p style="margin-top:10px; font-size:0.9rem;">${u.status || ''}</p>
                ${!isMe ? `<button onclick="toggleFollow('${id}')" style="margin-top:15px; padding:8px 20px; border-radius:20px; border:none; background:var(--p); color:#fff; font-weight:bold;">FOLLOW</button>` : ''}
                <button onclick="startChat('${id}')" style="margin-top:15px; padding:8px 20px; border-radius:20px; border:1px solid #eee; background:#fff; font-weight:bold;">MESSAGE</button>
            </div>
            <div class="grid">${pList.map(p => `<div class="grid-item"><img src="${p.img || ''}"></div>`).join('')}</div>
        `;
        showPage('profile');
    }

    function startChat(id) { targetId = id; showPage('dm'); }
    function sendMsg() {
        const input = document.getElementById('chat-input');
        if(!input.value || !targetId) return;
        db.chats.push({from:curId, to:targetId, text:input.value, time:new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
        save(); input.value = ''; render();
    }
    function sendMedia(emoji) {
        const link = prompt("링크 혹은 사진 URL을 입력하세요");
        if(link) { db.chats.push({from:curId, to:targetId, text: emoji + " " + link, time: '방금'}); save(); render(); }
    }

    function toggleFollow(id) {
        const my = db.profiles[curId];
        if(!my.following) my.following = [];
        const idx = my.following.indexOf(id);
        if(idx > -1) my.following.splice(idx, 1); else my.following.push(id);
        save(); viewProfile(id);
    }

    function updateHue(v) { document.documentElement.style.setProperty('--p-hue', v); }
    function saveProfile() {
        db.profiles[curId] = { ...db.profiles[curId], name: document.getElementById('set-name').value, status: document.getElementById('set-status').value, hue: document.getElementById('set-hue').value };
        save(); alert("저장됨"); render();
    }
    function switchUser() {
        const id = prompt("ID"); const pw = prompt("PW");
        const found = accounts.find(a => a.id === id && a.pw === pw);
        if(found) { curId = id; localStorage.setItem('arc_cur', id); location.reload(); } else { alert("정보 오류"); }
    }

    // --- 렌더링 ---
    function render() {
        const my = db.profiles[curId] || {name:curId, hue:260};
        updateHue(my.hue);

        // Feed
        document.getElementById('page-feed').innerHTML = db.posts.map(p => `
            <div class="post">
                <div class="post-header" onclick="viewProfile('${p.author}')">
                    <img src="https://i.pravatar.cc/100?u=${p.author}" class="p-img">
                    <b>${p.author}</b>
                </div>
                <b class="post-title">${p.title}</b>
                <p style="font-size:0.9rem;">${p.content}</p>
                ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                <div class="comment-sec">
                    <button onclick="addComment(${p.id})" style="border:none; background:none; color:var(--p); font-weight:bold; cursor:pointer;">댓글 달기</button>
                    <div style="margin-top:5px;">${p.comments.map(c => `<div><b>${c.author}:</b> ${c.text}</div>`).join('')}</div>
                </div>
            </div>`).join('');

        // Explore
        document.getElementById('explore-grid').innerHTML = db.posts.map(p => `
            <div class="grid-item" onclick="viewProfile('${p.author}')">
                <img src="${p.img || ''}">
                <span style="position:absolute; bottom:5px; left:5px; color:#fff; font-size:0.6rem; text-shadow:1px 1px 2px #000;">${p.author}</span>
            </div>`).join('');

        // Agency
        document.getElementById('page-agency').innerHTML = Object.keys(db.profiles).map(k => `
            <div class="u-card" onclick="viewProfile('${k}')">
                <img src="https://i.pravatar.cc/100?u=${k}" class="u-img-sq">
                <div><b>${db.profiles[k].name}</b><br><span style="color:#888; font-size:0.8rem;">${db.profiles[k].id}</span></div>
            </div>`).join('');

        // DM
        if(targetId && document.getElementById('page-dm').classList.contains('active')) {
            document.getElementById('chat-target').innerText = targetId + " 님과 대화";
            const logs = db.chats.filter(c => (c.from === curId && c.to === targetId) || (c.from === targetId && c.to === curId));
            document.getElementById('chat-box').innerHTML = logs.map(c => `
                <div class="msg ${c.from === curId ? 'me' : 'you'}">
                    ${c.from !== curId ? `<img src="https://i.pravatar.cc/100?u=${c.from}" style="width:30px; height:30px; border-radius:50%;">` : ''}
                    <div class="msg-bubble">${c.text}</div>
                </div>`).join('');
            const cb = document.getElementById('chat-box'); cb.scrollTop = cb.scrollHeight;
        }

        // Settings Sync
        if(document.getElementById('page-setting').classList.contains('active')) {
            document.getElementById('set-name').value = my.name || '';
            document.getElementById('set-status').value = my.status || '';
            document.getElementById('set-hue').value = my.hue || 260;
        }
    }
    render();
</script>
</body>
</html>

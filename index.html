<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCADE SOCIAL</title>
    <style>
        :root { --p-hue: 260; --p: hsl(var(--p-hue), 60%, 60%); --bg: #f3f4f6; --white: #fff; --me-chat: #99caff; --you-chat: #ffc299; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #e2e8f0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 430px; background: var(--white); display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        
        /* Common UI */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid #eee; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.4rem; color: #4a148c; letter-spacing: -1px; }
        .play-btn { background: linear-gradient(135deg, #4a148c, var(--p)); color: #fff; padding: 6px 18px; border-radius: 15px; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(124, 77, 255, 0.3); }

        main { flex: 1; overflow-y: auto; padding-bottom: 90px; background: var(--bg); position: relative; scroll-behavior: smooth; }
        .page { display: none; padding: 15px; min-height: 100%; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        /* Login Screen */
        #login-overlay { position: absolute; inset: 0; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .login-input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; }

        /* Feed Post Style */
        .post { background: #fff; border-radius: 25px; padding: 18px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .post-hdr { display: flex; align-items: center; margin-bottom: 12px; cursor: pointer; }
        .p-img-circle { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 12px; border: 2px solid #f1f5f9; }
        .post-title { font-weight: 900; font-size: 1.2rem; display: block; margin: 8px 0; font-style: italic; }
        .post-content { font-size: 0.95rem; line-height: 1.5; color: #334155; }
        .post-img { width: 100%; border-radius: 15px; margin-top: 12px; }
        .post-actions { display: flex; gap: 10px; margin-top: 15px; padding-top: 12px; border-top: 1px solid #f1f5f9; }
        .action-btn { background: #f8fafc; border: none; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; color: #64748b; }

        /* Comment System */
        .comment-section { margin-top: 15px; background: #f8fafc; border-radius: 15px; padding: 12px; font-size: 0.85rem; }
        .cmt-item { margin-bottom: 8px; }
        .cmt-reply { margin-left: 20px; border-left: 2px solid #ddd; padding-left: 10px; margin-top: 5px; color: #666; }

        /* Explore Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .grid-item { aspect-ratio: 1/1; background: #fff; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #eee; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .grid-tag { position: absolute; bottom: 5px; left: 5px; background: rgba(255,255,255,0.9); padding: 2px 6px; border-radius: 6px; font-size: 10px; font-weight: 800; }

        /* User List */
        .u-card { display: flex; align-items: center; background: #fff; padding: 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #eee; cursor: pointer; }
        .u-img-sq { width: 60px; height: 60px; border-radius: 18px; object-fit: cover; margin-right: 15px; }
        .u-info b { font-size: 1.1rem; color: #1e293b; display: block; }
        .u-info span { font-size: 0.85rem; color: #94a3b8; }

        /* DM Chat (Design from Scrat 1) */
        #chat-window { position: absolute; inset: 0; background: #fff; z-index: 500; display: none; flex-direction: column; }
        .chat-hdr { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; background: #fafafa; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; position: relative; }
        .msg.me { align-self: flex-end; }
        .msg.you { align-self: flex-start; }
        .bubble { padding: 12px 16px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; color: #fff; }
        .me .bubble { background: var(--me-chat); border-bottom-right-radius: 4px; }
        .you .bubble { background: var(--you-chat); border-bottom-left-radius: 4px; }
        .msg-info { font-size: 10px; color: #aaa; margin-top: 4px; }
        .reaction-txt { font-size: 11px; color: #7c4dff; font-weight: bold; margin-top: 4px; }

        /* Setting Page */
        .set-group { background: #fff; padding: 18px; border-radius: 20px; border: 1px solid #eee; margin-bottom: 15px; }
        .set-group label { display: block; font-size: 11px; font-weight: 900; color: var(--p); margin-bottom: 8px; }
        .set-group input, .set-group textarea { width: 100%; border: none; background: #f8fafc; padding: 12px; border-radius: 12px; outline: none; }
        .hue-slider { width: 100%; height: 10px; -webkit-appearance: none; background: linear-gradient(to right, red, yellow, green, cyan, blue, magenta, red); border-radius: 5px; margin-top: 10px; }

        /* Navigation */
        nav { height: 85px; background: #fff; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        nav button { background: none; border: none; color: #cbd5e1; font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; cursor: pointer; }
        nav button.active { color: var(--p); font-weight: 800; }
        nav i { font-size: 1.4rem; }

        /* Profile View */
        #profile-overlay { position: absolute; inset: 0; background: #fff; z-index: 600; display: none; padding: 20px; overflow-y: auto; }
        .prof-top { text-align: center; padding: 40px 0 20px; }
        .prof-img-big { width: 110px; height: 110px; border-radius: 40px; border: 4px solid var(--p); object-fit: cover; }
        .stat-bar { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .stat-item { padding: 8px 15px; background: #f1f5f9; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }

        /* Float Write Button */
        .float-btn { position: absolute; bottom: 105px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--p); color: #fff; border: none; font-size: 30px; cursor: pointer; z-index: 150; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div id="app">
    <div id="login-overlay">
        <h1 style="color: #4a148c; font-weight: 900; margin-bottom: 30px;">ARCADE PLAY</h1>
        <input type="text" id="l-id" class="login-input" placeholder="ID (ARCADE)">
        <input type="password" id="l-pw" class="login-input" placeholder="PW (01024773752)">
        <button onclick="handleLogin()" class="play-btn" style="width: 100%; padding: 15px;">LOGIN</button>
        <p style="font-size: 12px; color: #888; margin-top: 20px;">기본 계정으로 로그인 후 계정 추가 가능</p>
    </div>

    <div id="profile-overlay">
        <div style="display: flex; justify-content: space-between;">
            <button onclick="closeProfile()" class="action-btn">뒤로</button>
            <b style="font-size: 0.9rem;">PROFILE</b>
            <div style="width: 40px;"></div>
        </div>
        <div class="prof-top">
            <img id="pv-img" class="prof-img-big">
            <h2 id="pv-name" style="margin-top: 15px; font-weight: 900;"></h2>
            <p id="pv-id" style="color: #64748b;"></p>
            <div class="stat-bar" id="pv-stats"></div>
            <button id="pv-follow-btn" onclick="toggleFollow()" class="play-btn" style="padding: 10px 40px;">팔로우</button>
        </div>
        <div class="grid" id="pv-posts"></div>
    </div>

    <div id="chat-window">
        <div class="chat-hdr">
            <button onclick="closeChat()" style="border:none; background:none; font-size: 1.2rem;"><i class="fa-solid fa-arrow-left"></i></button>
            <img id="chat-p-img" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
            <b id="chat-p-name"></b>
        </div>
        <div class="chat-body" id="chat-content"></div>
        <div style="padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee;">
            <input type="text" id="chat-input" placeholder="메시지 입력..." style="flex:1; border:none; background:#f1f5f9; padding:12px; border-radius:20px; outline:none;">
            <button onclick="sendMsg()" style="color: var(--p); border:none; background:none; font-weight: 900;">send</button>
        </div>
    </div>

    <header>
        <div class="logo">ARCADE</div>
        <button class="play-btn" onclick="logout()">PLAY ✦</button>
    </header>

    <main id="main-scroll">
        <section id="page-feed" class="page active"></section>
        <section id="page-explore" class="page"><div class="grid" id="explore-list"></div></section>
        <section id="page-user" class="page"></section>
        <section id="page-dm" class="page">
            <h3 style="margin-bottom: 20px; font-weight: 900;">Messages</h3>
            <div id="dm-list"></div>
        </section>
        <section id="page-setting" class="page">
            <div style="text-align:center; margin-bottom: 25px;">
                <div style="position:relative; display:inline-block;" onclick="document.getElementById('set-file').click()">
                    <img id="set-pre" style="width:100px; height:100px; border-radius:35px; border:4px solid var(--p); object-fit:cover;">
                    <div style="position:absolute; bottom:0; right:0; background:var(--p); color:#fff; width:30px; height:30px; border-radius:50%; border:3px solid #fff; display:flex; align-items:center; justify-content:center; font-size:12px;"><i class="fa-solid fa-camera"></i></div>
                </div>
                <input type="file" id="set-file" style="display:none;" onchange="updatePrev(this)">
            </div>
            <div class="set-group"><label>NAME</label><input type="text" id="set-name"></div>
            <div class="set-group"><label>USER ID</label><input type="text" id="set-id"></div>
            <div class="set-group"><label>STATUS</label><textarea id="set-status" rows="2"></textarea></div>
            <div class="set-group"><label>THEME COLOR (HUE)</label><input type="range" id="set-hue" class="hue-slider" min="0" max="360" oninput="changeHue(this.value)"></div>
            <button onclick="saveProfile()" class="play-btn" style="width:100%; padding:18px; border-radius:20px; font-size:1rem;">저장 및 계정 추가</button>
        </section>
    </main>

    <button class="float-btn" id="write-trigger" onclick="openWrite()">+</button>

    <nav>
        <button onclick="showPage('feed')" id="nav-feed" class="active"><i class="fa-solid fa-house"></i>Feed</button>
        <button onclick="showPage('explore')" id="nav-explore"><i class="fa-solid fa-wand-magic-sparkles"></i>Explore</button>
        <button onclick="showPage('user')" id="nav-user"><i class="fa-solid fa-planet-ringed"></i>User</button>
        <button onclick="showPage('dm')" id="nav-dm"><i class="fa-solid fa-comment-dots"></i>DM</button>
        <button onclick="showPage('setting')" id="nav-setting"><i class="fa-solid fa-gear"></i>Setting</button>
    </nav>
</div>

<script>
    // --- Data Management ---
    let currentUser = 'ARCADE';
    let viewingUser = null;
    let activeChat = null;

    const db = JSON.parse(localStorage.getItem('arcade_v20')) || {
        users: {
            'ARCADE': { name:'아케이드', id:'@arcade', pw:'01024773752', img:'https://i.pravatar.cc/150?u=a1', status:'Welcome!', following:[], hue:260 },
            'ROSSY': { name:'ROSSY', id:'@rozzy.buzy', pw:'1234', img:'https://i.pravatar.cc/150?u=r1', status:'Stay busy!', following:[], hue:280 },
            'NANA': { name:'NANA', id:'@bananas', pw:'1234', img:'https://i.pravatar.cc/150?u=n1', status:'Fresh!', following:[], hue:40 }
        },
        posts: [
            { id: 1, author: 'ROSSY', title: 'HELLO WORLD', content: '아케이드 소셜 오픈을 축하합니다!', img: 'https://picsum.photos/400/500?random=1', comments: [] },
            { id: 2, author: 'NANA', title: 'BANANA', content: '모두 따뜻한 하루 보내요🍷', img: 'https://picsum.photos/400/500?random=2', comments: [] }
        ],
        chats: []
    };
    function save() { localStorage.setItem('arcade_v20', JSON.stringify(db)); }

    // --- Logic ---
    function handleLogin() {
        const id = document.getElementById('l-id').value;
        const pw = document.getElementById('l-pw').value;
        if(db.users[id] && db.users[id].pw === pw) {
            currentUser = id; document.getElementById('login-overlay').style.display='none'; render();
        } else { alert("정보가 틀립니다."); }
    }
    function logout() { document.getElementById('login-overlay').style.display='flex'; }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        document.getElementById('nav-'+id).classList.add('active');
        document.getElementById('write-trigger').style.display = (id === 'feed') ? 'block' : 'none';
        render();
    }

    function openProfile(uId) {
        viewingUser = uId;
        const u = db.users[uId];
        document.getElementById('pv-img').src = u.img;
        document.getElementById('pv-name').innerText = u.name;
        document.getElementById('pv-id').innerText = u.id;
        document.getElementById('pv-follow-btn').innerText = db.users[currentUser].following.includes(uId) ? "팔로잉" : "팔로우";
        
        const myPosts = db.posts.filter(p => p.author === uId);
        document.getElementById('pv-stats').innerHTML = `
            <div class="stat-item">${myPosts.length} 게시물</div>
            <div class="stat-item">19 팔로워</div>
            <div class="stat-item">${u.following.length} 팔로잉</div>
        `;
        document.getElementById('pv-posts').innerHTML = myPosts.map(p => `<div class="grid-item"><img src="${p.img}"></div>`).join('');
        document.getElementById('profile-overlay').style.display = 'block';
    }
    function closeProfile() { document.getElementById('profile-overlay').style.display = 'none'; }
    function toggleFollow() {
        const my = db.users[currentUser];
        if(my.following.includes(viewingUser)) my.following = my.following.filter(f => f !== viewingUser);
        else my.following.push(viewingUser);
        save(); openProfile(viewingUser);
    }

    function openChat(uId) {
        activeChat = uId;
        document.getElementById('chat-p-img').src = db.users[uId].img;
        document.getElementById('chat-p-name').innerText = db.users[uId].name;
        document.getElementById('chat-window').style.display = 'flex';
        renderChat();
    }
    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }
    function sendMsg() {
        const val = document.getElementById('chat-input').value;
        if(!val) return;
        db.chats.push({ from: currentUser, to: activeChat, text: val, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        document.getElementById('chat-input').value = '';
        save(); renderChat();
    }
    function renderChat() {
        const msgs = db.chats.filter(c => (c.from===currentUser && c.to===activeChat) || (c.from===activeChat && c.to===currentUser));
        document.getElementById('chat-content').innerHTML = msgs.map(c => `
            <div class="msg ${c.from===currentUser?'me':'you'}">
                <div class="bubble">${c.text}</div>
                <div class="msg-info">${c.time}</div>
            </div>
        `).join('');
        const b = document.getElementById('chat-content'); b.scrollTop = b.scrollHeight;
    }

    function openWrite() {
        const t = prompt("제목을 입력하세요");
        const c = prompt("내용을 입력하세요");
        const i = prompt("이미지 URL (직접 업로드는 Setting 참조)");
        if(t && c) {
            db.posts.unshift({ id: Date.now(), author: currentUser, title: t, content: c, img: i || 'https://picsum.photos/400/500', comments: [] });
            save(); render();
        }
    }

    function deletePost(id) { if(confirm("삭제할까요?")) { db.posts = db.posts.filter(p => p.id !== id); save(); render(); } }
    function addComment(pId) {
        const txt = prompt("댓글 내용");
        if(txt) {
            db.posts.find(p => p.id === pId).comments.push({ user: currentUser, text: txt, replies: [] });
            save(); render();
        }
    }

    function changeHue(v) { document.documentElement.style.setProperty('--p-hue', v); }
    function updatePrev(input) {
        if(input.files[0]) {
            const r = new FileReader(); r.onload = (e) => document.getElementById('set-pre').src = e.target.result;
            r.readAsDataURL(input.files[0]);
        }
    }
    function saveProfile() {
        const newId = document.getElementById('set-id').value.replace('@','');
        db.users[newId] = {
            ...db.users[currentUser],
            name: document.getElementById('set-name').value,
            id: '@'+newId,
            status: document.getElementById('set-status').value,
            img: document.getElementById('set-pre').src,
            hue: document.getElementById('set-hue').value
        };
        currentUser = newId; save(); render(); alert("계정이 업데이트/추가되었습니다!");
    }

    function render() {
        const me = db.users[currentUser];
        changeHue(me.hue);
        // Feed
        document.getElementById('page-feed').innerHTML = db.posts.map(p => `
            <div class="post">
                <div class="post-hdr" onclick="openProfile('${p.author}')">
                    <img src="${db.users[p.author].img}" class="p-img-circle">
                    <div><b>${db.users[p.author].name}</b><br><span style="font-size:11px; color:#94a3b8;">${db.users[p.author].id}</span></div>
                </div>
                <b class="post-title">${p.title}</b>
                <p class="post-content">${p.content}</p>
                ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                <div class="post-actions">
                    <button class="action-btn" onclick="addComment(${p.id})">💬 댓글 ${p.comments.length}</button>
                    ${p.author === currentUser ? `<button class="action-btn" onclick="deletePost(${p.id})" style="color:red">삭제</button>` : ''}
                </div>
                ${p.comments.length > 0 ? `<div class="comment-section">${p.comments.map(c => `<div class="cmt-item"><b>${c.user}:</b> ${c.text}</div>`).join('')}</div>` : ''}
            </div>
        `).join('');

        // Explore
        document.getElementById('explore-list').innerHTML = db.posts.map(p => `
            <div class="grid-item" onclick="openProfile('${p.author}')">
                <img src="${p.img}">
                <div class="grid-tag">${p.author}</div>
            </div>
        `).join('');

        // User
        document.getElementById('page-user').innerHTML = Object.keys(db.users).map(u => `
            <div class="u-card" onclick="openProfile('${u}')">
                <img src="${db.users[u].img}" class="u-img-sq">
                <div class="u-info"><b>${db.users[u].name}</b><span>${db.users[u].id}</span></div>
            </div>
        `).join('');

        // DM List
        document.getElementById('dm-list').innerHTML = Object.keys(db.users).filter(u => u !== currentUser).map(u => `
            <div class="u-card" onclick="openChat('${u}')">
                <img src="${db.users[u].img}" class="u-img-sq" style="border-radius:50%">
                <div class="u-info"><b>${db.users[u].name}</b><span>대화하기</span></div>
            </div>
        `).join('');

        // Setting Sync
        document.getElementById('set-name').value = me.name;
        document.getElementById('set-id').value = me.id;
        document.getElementById('set-status').value = me.status;
        document.getElementById('set-pre').src = me.img;
        document.getElementById('set-hue').value = me.hue;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARCADE</title>

<style>
body{
  margin:0;
  background:#dfe6ee;
  display:flex;
  justify-content:center;
  font-family:-apple-system, sans-serif;
}

.phone{
  width:390px;
  height:844px;
  background:linear-gradient(180deg,#f8f9fb,#e3ebf3);
  border-radius:30px;
  overflow:hidden;
  position:relative;
}

header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  font-weight:600;
}

.play{
  background:linear-gradient(135deg,#6a5acd,#8fd3f4);
  color:white;
  padding:8px 15px;
  border-radius:12px;
}

.container{
  padding:10px;
  height:690px;
  overflow:auto;
}

.card{
  background:white;
  border-radius:20px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.avatar{
  width:40px;height:40px;
  border-radius:50%;
  background:#ccc;
}

.user{
  display:flex;
  gap:10px;
  align-items:center;
}

.chat{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  display:flex;
  gap:8px;
}

.me{justify-content:flex-end;}

.bubble{
  padding:10px;
  border-radius:15px;
  max-width:65%;
}

.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.grid div{
  aspect-ratio:1;
  background:#ddd;
  border-radius:15px;
  overflow:hidden;
}

.grid img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.reply{
  margin-left:20px;
  border-left:2px solid #ddd;
  padding-left:10px;
}
</style>
</head>

<body>

<div class="phone">

<header>
  ARCADE
  <div class="play" onclick="login()">PLAY</div>
</header>

<div class="container" id="app"></div>

<div class="bottom">
  <div onclick="feed()">Feed</div>
  <div onclick="explore()">Explore</div>
  <div onclick="users()">User</div>
  <div onclick="dmList()">DM</div>
  <div onclick="setting()">Set</div>
</div>

</div>

<script>
let user = JSON.parse(localStorage.getItem("user")) || null;
let usersData = JSON.parse(localStorage.getItem("users")) || [];
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let chats = JSON.parse(localStorage.getItem("chats")) || {};

let currentChat = null;

function save(){
  localStorage.setItem("user",JSON.stringify(user));
  localStorage.setItem("users",JSON.stringify(usersData));
  localStorage.setItem("posts",JSON.stringify(posts));
  localStorage.setItem("chats",JSON.stringify(chats));
}

/* 로그인 */
function login(){
  let id=prompt("ID");
  let pw=prompt("PW");

  if(id==="ARCADE" && pw==="01024773752"){
    let name=prompt("이름");
    user={name,id:"@"+name,color:"#ffd1dc"};
    usersData.push(user);
    save();
    feed();
  } else alert("실패");
}

/* 이미지 */
function toBase64(file, callback){
  const reader=new FileReader();
  reader.onload=()=>callback(reader.result);
  reader.readAsDataURL(file);
}

/* FEED */
function feed(){
  let html=`
  <div class="card">
    <input id="t" placeholder="제목">
    <textarea id="c" placeholder="내용"></textarea>
    <input type="file" id="img">
    <button onclick="addPost()">업로드</button>
  </div>`;

  posts.forEach((p,i)=>{
    html+=`
    <div class="card">
      <div class="user" onclick="profile('${p.user}')">
        <div class="avatar"></div>
        <b>${p.user}</b>
      </div>
      <b>${p.title}</b>
      <p>${p.content}</p>
      ${p.img?`<img src="${p.img}" style="width:100%;border-radius:15px;">`:''}

      <button onclick="addComment(${i})">댓글</button>

      ${(p.comments||[]).map((c,ci)=>`
        <div>
          💬 ${c.text}
          <button onclick="addReply(${i},${ci})">↩</button>

          ${(c.replies||[]).map(r=>`
            <div class="reply">↳ ${r}</div>
          `).join("")}
        </div>
      `).join("")}

    </div>`;
  });

  app.innerHTML=html;
}

function addPost(){
  let file=img.files[0];

  if(file){
    toBase64(file,(data)=>{
      posts.unshift({title:t.value,content:c.value,img:data,user:user.name,comments:[]});
      save(); feed();
    });
  }else{
    posts.unshift({title:t.value,content:c.value,user:user.name,comments:[]});
    save(); feed();
  }
}

function addComment(i){
  let text=prompt("댓글");
  posts[i].comments.push({text,replies:[]});
  save(); feed();
}

function addReply(i,ci){
  let text=prompt("대댓글");
  posts[i].comments[ci].replies.push(text);
  save(); feed();
}

/* EXPLORE */
function explore(){
  app.innerHTML=`
  <div class="grid">
  ${posts.map(p=>`<div>${p.img?`<img src="${p.img}">`:''}</div>`).join("")}
  </div>`;
}

/* USERS */
function users(){
  app.innerHTML=`
    <div class="card" onclick="createChat()">➕ 채팅 추가</div>
    ${usersData.map(u=>`
    <div class="card user" onclick="profile('${u.name}')">
      <div class="avatar"></div>
      <div>
        <b>${u.name}</b><br>
        <span style="color:gray">${u.id}</span>
      </div>
    </div>`).join("")}
  `;
}

/* PROFILE */
function profile(name){
  let userPosts=posts.filter(p=>p.user===name);

  app.innerHTML=`
  <div class="card">
    <div class="avatar"></div>
    <h3>${name}</h3>
    <button onclick="openChat('${name}')">DM</button>
  </div>

  ${userPosts.map(p=>`
    <div class="card">
      <b>${p.title}</b>
      <p>${p.content}</p>
      ${p.img?`<img src="${p.img}" style="width:100%">`:''}
    </div>
  `).join("")}
  `;
}

/* DM LIST */
function dmList(){
  let html=`
    <div class="card" onclick="createChat()">➕ 채팅 추가</div>
  `;

  Object.keys(chats).forEach(name=>{
    html+=`
      <div class="card user" onclick="openChat('${name}')">
        <div class="avatar"></div>
        <b>${name}</b>
      </div>
    `;
  });

  app.innerHTML=html;
}

function createChat(){
  let name=prompt("채팅할 유저 이름");
  if(!chats[name]) chats[name]=[];
  save();
  dmList();
}

/* DM */
function openChat(name){
  currentChat=name;

  let html=`<div class="chat">`;

  (chats[name]||[]).forEach(c=>{
    html+=`
    <div class="msg ${c.me?'me':''}">
      ${!c.me?'<div class="avatar"></div>':''}
      <div class="bubble" style="background:${c.me?user.color:'#e6ecf2'}">
        ${c.text}
        ${c.img?`<img src="${c.img}" style="width:100%;margin-top:5px;border-radius:10px;">`:''}
      </div>
    </div>`;
  });

  html+=`
    <input type="file" id="dmImg">
    <input id="m">
    <button onclick="send()">send</button>
  </div>`;

  app.innerHTML=html;
}

function send(){
  let file=dmImg.files[0];

  if(!chats[currentChat]) chats[currentChat]=[];

  if(file){
    toBase64(file,(data)=>{
      chats[currentChat].push({text:m.value,img:data,me:true});
      save(); openChat(currentChat);
    });
  }else{
    chats[currentChat].push({text:m.value,me:true});
    save(); openChat(currentChat);
  }
}

/* SETTING */
function setting(){
  app.innerHTML=`
  <div class="card">
    이름 <input id="n" value="${user?.name||''}">
    색상 <input id="col" value="${user?.color||'#ffd1dc'}">
    <button onclick="saveUser()">저장</button>
  </div>`;
}

function saveUser(){
  user.name=n.value;
  user.color=col.value;
  save();
  alert("저장됨");
}

feed();
</script>

</body>
</html>

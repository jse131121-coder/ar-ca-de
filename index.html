<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE SOCIAL</title>
    <style>
        :root { --p-hue: 260; --p: hsl(var(--p-hue), 60%, 60%); --bg: #f8f9fa; --white: #fff; --gray: #94a3b8; --me: hsl(var(--p-hue), 80%, 85%); --you: #ffebe6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #e2e8f0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 430px; background: var(--white); display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        
        /* Header */
        header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; background: #fff; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--p); letter-spacing: -1px; }

        /* Main Area */
        main { flex: 1; overflow-y: auto; padding-bottom: 85px; background: var(--bg); position: relative; }
        .page { display: none; padding: 16px; min-height: 100%; }
        .page.active { display: block; }

        /* --- 1. FEED --- */
        .post { background: #fff; border-radius: 22px; padding: 18px; margin-bottom: 16px; border: 1px solid #eee; }
        .post-header { display: flex; align-items: center; margin-bottom: 10px; }
        .p-img-round { width: 40px; height: 40px; border-radius: 50%; background: #eee; margin-right: 12px; object-fit: cover; }
        .post-title { font-weight: 800; font-size: 1.1rem; margin: 8px 0; display: block; }
        .post-img { width: 100%; border-radius: 14px; margin-top: 10px; display: block; }

        /* --- 2. EXPLORE --- */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
        .grid-item { aspect-ratio: 1/1; background: #eee; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 3. AGENCY --- */
        .u-card { display: flex; align-items: center; background: #fff; padding: 15px; border-radius: 18px; margin-bottom: 10px; border: 1px solid #eee; cursor: pointer; }
        .u-img-sq { width: 55px; height: 55px; border-radius: 15px; background: #eee; margin-right: 15px; object-fit: cover; }

        /* --- 4. DM (독립된 채팅 공간) --- */
        #page-dm { padding: 0; display: flex; flex-direction: column; background: #fff; }
        .dm-header { padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        .msg { display: flex; gap: 8px; max-width: 85%; position: relative; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; font-size: 0.9rem; position: relative; }
        .me .msg-bubble { background: var(--me); border-bottom-right-radius: 2px; }
        .you .msg-bubble { background: var(--you); border-bottom-left-radius: 2px; border: 1px solid #ffdcd3; }
        .msg-heart { position: absolute; bottom: -8px; left: -5px; background: white; border: 1px solid #eee; border-radius: 10px; padding: 2px 5px; font-size: 0.6rem; }
        .chat-input-bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; background: #fff; }
        .chat-input-bar input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #eee; outline: none; }

        /* --- 5. SETTING --- */
        .set-section { background: #fff; border-radius: 20px; padding: 20px; border: 1px solid #eee; }
        .set-section h4 { font-size: 0.8rem; color: var(--p); margin-bottom: 15px; }
        .set-section input, .set-section textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #eee; outline: none; }

        /* --- WRITE WINDOW (Slide-up) --- */
        #write-win { 
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 90%; 
            background: #fff; z-index: 500; border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1); transition: bottom 0.4s ease;
            display: flex; flex-direction: column; padding: 20px;
        }
        #write-win.active { bottom: 0; }
        .win-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .img-slot { width: 100%; height: 200px; background: #f3f5f7; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; border: 2px dashed #eee; cursor: pointer; }
        #post-content { flex: 1; border: none; outline: none; font-size: 1rem; resize: none; }

        /* Floating Button */
        .float-btn { position: absolute; bottom: 100px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--p), #a78bfa); color: #fff; border: none; font-size: 30px; cursor: pointer; z-index: 200; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* Bottom Nav */
        nav { position: absolute; bottom: 0; width: 100%; height: 85px; background: #fff; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-around; align-items: center; z-index: 150; }
        nav button { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        nav button.active { color: var(--p); font-weight: 800; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo">ARCADE</div>
        <button style="border:none; background:none; color:var(--p); font-weight:bold; cursor:pointer;" onclick="login()">LOGIN</button>
    </header>

    <main>
        <section id="page-feed" class="page active"></section>
        <section id="page-explore" class="page"><div class="grid" id="explore-grid"></div></section>
        <section id="page-agency" class="page"></section>
        <section id="page-dm" class="page">
            <div class="dm-header" id="chat-target-name">대화 상대 선택</div>
            <div class="chat-box" id="chat-box"></div>
            <div class="chat-input-bar">
                <input type="text" id="dm-input" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) sendDM()">
                <button onclick="sendDM()" style="border:none; background:none; color:var(--p); font-weight:bold;">전송</button>
            </div>
        </section>
        <section id="page-setting" class="page">
            <div class="set-section">
                <h4>MY PROFILE</h4>
                <input type="text" id="set-name" placeholder="이름">
                <input type="text" id="set-id" placeholder="아이디">
                <textarea id="set-status" placeholder="상태 메시지"></textarea>
                <p style="font-size:0.7rem; margin-bottom:5px;">채팅 테마 색상</p>
                <input type="range" id="set-hue" min="0" max="360" oninput="updateHue(this.value)">
                <button onclick="saveProfile()" style="width:100%; padding:12px; background:var(--p); color:#fff; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">저장</button>
            </div>
        </section>
    </main>

    <div id="write-win">
        <div class="win-nav">
            <button onclick="toggleWrite(false)" style="background:none; border:none; color:#888; font-size:1.5rem;">×</button>
            <b style="font-size:1.1rem;">새 게시물</b>
            <button onclick="postSubmit()" style="background:var(--p); color:#fff; border:none; padding:6px 15px; border-radius:20px; font-weight:bold;">공유</button>
        </div>
        <div class="img-slot" onclick="document.getElementById('file-in').click()">
            <img id="preview-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            <span id="slot-text">사진을 선택하세요</span>
        </div>
        <input type="file" id="file-in" style="display:none;" onchange="imgPreview(this)">
        <input type="text" id="post-title-in" placeholder="제목을 입력하세요" style="width:100%; padding:10px 0; border:none; border-bottom:1px solid #eee; font-size:1.1rem; font-weight:bold; outline:none;">
        <textarea id="post-content" placeholder="내용을 입력하세요..."></textarea>
    </div>

    <button class="float-btn" id="write-trigger" onclick="toggleWrite(true)">+</button>

    <nav>
        <button onclick="showPage('feed')" id="nav-feed" class="active">🏛️<br>Feed</button>
        <button onclick="showPage('explore')" id="nav-explore">✨<br>Explore</button>
        <button onclick="showPage('agency')" id="nav-agency">🪐<br>Agency</button>
        <button onclick="showPage('dm')" id="nav-dm">💬<br>DM</button>
        <button onclick="showPage('setting')" id="nav-setting">⚙️<br>Setting</button>
    </nav>
</div>

<script>
    let curId = localStorage.getItem('arc_cur') || 'ARCADE';
    let targetId = null;
    let tempImg = "";
    let db = JSON.parse(localStorage.getItem('arc_db')) || {
        posts: [{author:'ARCADE', title:'반갑습니다!', content:'나만의 아케이드 소셜.', img:'https://picsum.photos/400/300'}],
        chats: [],
        profiles: { 'ARCADE': {name:'아케이드', id:'@arcade.buzy', hue:260} }
    };
    function save() { localStorage.setItem('arc_db', JSON.stringify(db)); }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        document.getElementById('nav-'+id).classList.add('active');
        document.getElementById('write-trigger').style.display = (id === 'feed') ? 'block' : 'none';
        render();
    }

    function toggleWrite(open) { document.getElementById('write-win').classList.toggle('active', open); }

    function imgPreview(input) {
        if(input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                tempImg = e.target.result;
                document.getElementById('preview-img').src = tempImg;
                document.getElementById('preview-img').style.display = 'block';
                document.getElementById('slot-text').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function postSubmit() {
        const title = document.getElementById('post-title-in').value;
        const content = document.getElementById('post-content').value;
        if(!title) return alert("제목을 입력하세요!");
        db.posts.unshift({author:curId, title, content, img:tempImg});
        save();
        location.reload(); // 리프레시로 깔끔하게 정리
    }

    function startChat(id) { targetId = id; showPage('dm'); }
    function sendDM() {
        const input = document.getElementById('dm-input');
        if(!input.value || !targetId) return;
        db.chats.push({from:curId, to:targetId, text:input.value, time:new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
        save(); input.value = ''; render();
    }

    function updateHue(v) { document.documentElement.style.setProperty('--p-hue', v); }
    function saveProfile() {
        db.profiles[curId] = { ...db.profiles[curId], name:document.getElementById('set-name').value, id:document.getElementById('set-id').value, status:document.getElementById('set-status').value, hue:document.getElementById('set-hue').value };
        save(); alert("저장됨!"); render();
    }

    function render() {
        const my = db.profiles[curId] || {hue:260};
        updateHue(my.hue);

        // Feed
        document.getElementById('page-feed').innerHTML = db.posts.map(p => `
            <div class="post">
                <div class="post-header" onclick="startChat('${p.author}')">
                    <img src="https://i.pravatar.cc/100?u=${p.author}" class="p-img-round">
                    <b>${p.author}</b>
                </div>
                <b class="post-title">${p.title}</b>
                <p style="font-size:0.95rem;">${p.content}</p>
                ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
            </div>`).join('');

        // Explore
        document.getElementById('explore-grid').innerHTML = db.posts.map(p => `
            <div class="grid-item"><img src="${p.img || ''}"></div>`).join('');

        // Agency
        document.getElementById('page-agency').innerHTML = Object.keys(db.profiles).map(k => `
            <div class="u-card" onclick="startChat('${k}')">
                <img src="https://i.pravatar.cc/100?u=${k}" class="u-img-sq">
                <div><b>${db.profiles[k].name}</b><br><span style="color:#888;">${db.profiles[k].id}</span></div>
            </div>`).join('');

        // DM
        if(targetId && document.getElementById('page-dm').classList.contains('active')) {
            document.getElementById('chat-target-name').innerText = targetId + " 님";
            const logs = db.chats.filter(c => (c.from === curId && c.to === targetId) || (c.from === targetId && c.to === curId));
            document.getElementById('chat-box').innerHTML = logs.map(c => `
                <div class="msg ${c.from === curId ? 'me' : 'you'}">
                    ${c.from !== curId ? `<img src="https://i.pravatar.cc/100?u=${c.from}" style="width:32px; height:32px; border-radius:50%;">` : ''}
                    <div class="msg-bubble">${c.text} ${c.from !== curId ? '<div class="msg-heart">❤️</div>' : ''}</div>
                </div>`).join('');
            const cb = document.getElementById('chat-box'); cb.scrollTop = cb.scrollHeight;
        }

        // Setting Sync
        if(document.getElementById('page-setting').classList.contains('active')) {
            document.getElementById('set-name').value = my.name || '';
            document.getElementById('set-id').value = my.id || '';
            document.getElementById('set-status').value = my.status || '';
            document.getElementById('set-hue').value = my.hue || 260;
        }
    }
    render();
</script>
</body>
</html>

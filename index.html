<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE SOCIAL</title>
    <style>
        :root { --p-hue: 260; --p: hsl(var(--p-hue), 60%, 60%); --bg: #f8f9fa; --white: #fff; --gray: #94a3b8; --me: hsl(var(--p-hue), 80%, 85%); --you: #ffebe6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background: #e2e8f0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 430px; background: var(--white); display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        
        /* Header */
        header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; background: #fff; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--p); letter-spacing: -1px; }
        .login-btn { font-size: 0.75rem; font-weight: bold; color: var(--p); border: 1.5px solid var(--p); padding: 4px 12px; border-radius: 20px; cursor: pointer; background: none; }

        /* Main View */
        main { flex: 1; overflow-y: auto; padding-bottom: 85px; background: var(--bg); position: relative; }
        .page { display: none; padding: 16px; min-height: 100%; }
        .page.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- 1. FEED --- */
        .post { background: #fff; border-radius: 22px; padding: 18px; margin-bottom: 16px; border: 1px solid #eee; }
        .post-header { display: flex; align-items: center; margin-bottom: 12px; cursor: pointer; }
        .p-img-round { width: 42px; height: 42px; border-radius: 50%; background: #eee; margin-right: 12px; object-fit: cover; }
        .post-title { font-weight: 800; font-size: 1.15rem; color: #1e293b; margin: 8px 0; display: block; }
        .post-body { font-size: 0.92rem; color: #475569; line-height: 1.6; white-space: pre-wrap; }
        .post-img { width: 100%; border-radius: 14px; margin-top: 14px; display: block; border: 1px solid #f1f5f9; }

        /* --- 2. EXPLORE --- */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
        .grid-item { aspect-ratio: 1/1; background: #eee; position: relative; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .grid-badge { position: absolute; bottom: 5px; left: 5px; width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #fff; }

        /* --- 3. AGENCY (USER LIST) --- */
        .u-card { display: flex; align-items: center; background: #fff; padding: 16px; border-radius: 18px; margin-bottom: 10px; border: 1px solid #eee; cursor: pointer; }
        .u-img-sq { width: 55px; height: 55px; border-radius: 16px; background: #eee; margin-right: 15px; object-fit: cover; }
        .u-info b { display: block; font-size: 1rem; color: #1e293b; margin-bottom: 2px; }
        .u-info span { font-size: 0.8rem; color: var(--gray); }

        /* --- 4. DM (핵심) --- */
        #page-dm { padding: 0; display: flex; flex-direction: column; background: #fff; }
        .dm-header { padding: 15px; border-bottom: 1px solid #f1f5f9; font-weight: 800; text-align: center; font-size: 0.9rem; color: #334155; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; background: #fafafa; }
        .msg { display: flex; gap: 10px; max-width: 85%; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 11px 15px; border-radius: 20px; font-size: 0.9rem; line-height: 1.5; position: relative; }
        .me .msg-bubble { background: var(--me); border-bottom-right-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .you .msg-bubble { background: var(--you); border-bottom-left-radius: 4px; border: 1px solid #ffdcd3; }
        .msg-time { font-size: 0.65rem; color: var(--gray); margin-top: 5px; align-self: flex-end; }
        .msg-heart { position: absolute; bottom: -8px; left: -5px; background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 1px 5px; font-size: 0.7rem; cursor: pointer; }
        .chat-bar { padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        .chat-bar input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #e2e8f0; outline: none; background: #f8fafc; }

        /* --- 5. SETTING --- */
        .set-card { background: #fff; padding: 20px; border-radius: 20px; border: 1px solid #eee; margin-bottom: 15px; }
        .set-card h4 { font-size: 0.85rem; color: var(--p); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .set-card input, .set-card textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #e2e8f0; outline: none; }
        .color-preview { padding: 15px; border-radius: 15px; background: var(--me); text-align: center; font-size: 0.8rem; font-weight: bold; color: #1e293b; margin-top: 10px; border: 1px dashed var(--p); }

        /* UI Components */
        .write-btn { position: absolute; bottom: 100px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--p), #a78bfa); color: #fff; border: none; font-size: 30px; cursor: pointer; z-index: 200; box-shadow: 0 10px 25px rgba(93, 62, 188, 0.3); }
        nav { position: absolute; bottom: 0; width: 100%; height: 85px; background: #fff; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-around; align-items: center; z-index: 150; }
        nav button { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        nav button.active { color: var(--p); font-weight: 800; }
        .nav-icon { font-size: 1.5rem; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo">ARCADE</div>
        <button class="login-btn" onclick="systemLogin()">LOGIN</button>
    </header>

    <main id="scroll-area">
        <section id="page-feed" class="page active"></section>
        
        <section id="page-explore" class="page">
            <div class="grid" id="explore-grid"></div>
        </section>

        <section id="page-agency" class="page"></section>

        <section id="page-dm" class="page">
            <div class="dm-header" id="dm-target-label">대화 상대를 선택하세요</div>
            <div class="chat-box" id="chat-box"></div>
            <div class="chat-bar">
                <input type="text" id="dm-input" placeholder="메시지 보내기..." onkeypress="if(event.keyCode==13) sendDM()">
                <button onclick="sendDM()" style="border:none; background:none; color:var(--p); font-weight:bold; cursor:pointer;">전송</button>
            </div>
        </section>

        <section id="page-setting" class="page">
            <div class="set-card">
                <h4>My Profile</h4>
                <input type="text" id="set-name" placeholder="이름">
                <input type="text" id="set-id" placeholder="아이디">
                <textarea id="set-status" placeholder="상태 메시지"></textarea>
                <p style="font-size:0.75rem; font-weight:bold; margin-bottom:10px;">Chat Theme Color</p>
                <input type="range" id="set-hue" min="0" max="360" oninput="updateHue(this.value)">
                <div class="color-preview">나의 말풍선 미리보기</div>
                <button onclick="saveMyInfo()" style="width:100%; padding:14px; background:var(--p); color:#fff; border:none; border-radius:12px; font-weight:bold; margin-top:20px; cursor:pointer;">정보 저장</button>
            </div>
            <div class="set-card" style="background:#f8fafc">
                <h4>Accounts</h4>
                <input type="text" id="add-acc-id" placeholder="새 계정 아이디">
                <input type="password" id="add-acc-pw" placeholder="비밀번호">
                <button onclick="addAccount()" style="width:100%; padding:12px; background:#1e293b; color:#fff; border:none; border-radius:12px; cursor:pointer;">계정 추가</button>
            </div>
        </section>
    </main>

    <input type="file" id="img-upload" style="display:none" onchange="processUpload(this)">
    <button class="write-btn" id="write-btn" onclick="document.getElementById('img-upload').click()">+</button>

    <nav>
        <button onclick="showPage('feed')" id="nav-feed" class="active"><span class="nav-icon">🏛️</span>Feed</button>
        <button onclick="showPage('explore')" id="nav-explore"><span class="nav-icon">✨</span>Explore</button>
        <button onclick="showPage('agency')" id="nav-agency"><span class="nav-icon">🪐</span>Agency</button>
        <button onclick="showPage('dm')" id="nav-dm"><span class="nav-icon">💬</span>DM</button>
        <button onclick="showPage('setting')" id="nav-setting"><span class="nav-icon">⚙️</span>Setting</button>
    </nav>
</div>

<script>
    // --- 1. DATA DB ---
    let accounts = JSON.parse(localStorage.getItem('arc_accs')) || [{id:'ARCADE', pw:'01024773752'}];
    let curId = localStorage.getItem('arc_cur') || 'ARCADE';
    let targetId = null; // 현재 누구랑 채팅 중인가?

    let db = JSON.parse(localStorage.getItem('arc_db')) || {
        posts: [{id:1, author:'ARCADE', title:'반가워요!', content:'여기에 일상을 공유하세요.', img:'https://picsum.photos/400/300', date:'2026.03.18'}],
        chats: [],
        profiles: { 'ARCADE': {name:'아케이드', id:'@arcade.buzy', status:'Welcome!', hue:260} }
    };
    function save() { localStorage.setItem('arc_db', JSON.stringify(db)); }

    // --- 2. NAVIGATION ---
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        document.getElementById('nav-'+id).classList.add('active');
        document.getElementById('write-btn').style.display = (id === 'feed') ? 'block' : 'none';
        render();
    }

    // --- 3. 핵심 기능 ---
    function startChat(id) {
        targetId = id;
        showPage('dm');
    }

    function sendDM() {
        const input = document.getElementById('dm-input');
        if(!input.value || !targetId) return;
        db.chats.push({
            from: curId, to: targetId, text: input.value, 
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });
        save(); input.value = ''; render();
    }

    function processUpload(input) {
        if(!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const t = prompt("제목(Bold)"); const c = prompt("내용");
            if(t && c) {
                db.posts.unshift({id:Date.now(), author:curId, title:t, content:c, img:e.target.result, date:new Date().toLocaleDateString()});
                save(); render();
            }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function systemLogin() {
        const id = prompt("ID"); const pw = prompt("PW");
        if(accounts.find(a => a.id === id && a.pw === pw)) {
            curId = id; localStorage.setItem('arc_cur', id); location.reload();
        } else { alert("정보 오류"); }
    }

    function addAccount() {
        const id = document.getElementById('add-acc-id').value;
        const pw = document.getElementById('add-acc-pw').value;
        if(!id || !pw) return;
        accounts.push({id, pw});
        localStorage.setItem('arc_accs', JSON.stringify(accounts));
        db.profiles[id] = {name:id, id:'@'+id.toLowerCase(), status:'New!', hue:200};
        save(); alert("계정 생성됨. LOGIN 해주세요.");
    }

    function updateHue(v) { document.documentElement.style.setProperty('--p-hue', v); }

    function saveMyInfo() {
        db.profiles[curId] = {
            ...db.profiles[curId],
            name: document.getElementById('set-name').value,
            id: document.getElementById('set-id').value,
            status: document.getElementById('set-status').value,
            hue: document.getElementById('set-hue').value
        };
        save(); alert("저장 완료"); render();
    }

    // --- 4. RENDER 엔진 ---
    function render() {
        const my = db.profiles[curId] || {name:curId, id:'@'+curId, hue:260};
        updateHue(my.hue);

        // Feed
        document.getElementById('page-feed').innerHTML = db.posts.map(p => `
            <div class="post">
                <div class="post-header" onclick="startChat('${p.author}')">
                    <img src="https://i.pravatar.cc/100?u=${p.author}" class="p-img-round">
                    <div style="flex:1"><b>${p.author}</b><span style="font-size:0.7rem; color:var(--gray); margin-left:8px;">${p.date}</span></div>
                </div>
                <b class="post-title">${p.title}</b>
                <p class="post-body">${p.content}</p>
                ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
            </div>`).join('');

        // Explore
        document.getElementById('explore-grid').innerHTML = db.posts.map(p => `
            <div class="grid-item" onclick="startChat('${p.author}')">
                <img src="${p.img || ''}">
                <img src="https://i.pravatar.cc/100?u=${p.author}" class="grid-badge">
            </div>`).join('');

        // Agency
        document.getElementById('page-agency').innerHTML = Object.keys(db.profiles).map(k => {
            const u = db.profiles[k];
            return `
            <div class="u-card" onclick="startChat('${k}')">
                <img src="https://i.pravatar.cc/100?u=${k}" class="u-img-sq">
                <div class="u-info"><b>${u.name}</b><span>${u.id}</span></div>
            </div>`;
        }).join('');

        // DM (완벽 구현)
        if(targetId && document.getElementById('page-dm').classList.contains('active')) {
            const target = db.profiles[targetId] || {name:targetId};
            document.getElementById('dm-target-label').innerText = `${target.name} 님과의 대화`;
            const logs = db.chats.filter(c => (c.from === curId && c.to === targetId) || (c.from === targetId && c.to === curId));
            document.getElementById('chat-box').innerHTML = logs.map(c => `
                <div class="msg ${c.from === curId ? 'me' : 'you'}">
                    ${c.from !== curId ? `<img src="https://i.pravatar.cc/100?u=${c.from}" style="width:32px; height:32px; border-radius:50%;">` : ''}
                    <div style="display:flex; flex-direction:column;">
                        <div class="msg-bubble">
                            ${c.text}
                            ${c.from !== curId ? `<div class="msg-heart">❤️</div>` : ''}
                        </div>
                        <span class="msg-time">${c.time}</span>
                    </div>
                </div>`).join('');
            const cb = document.getElementById('chat-box'); cb.scrollTop = cb.scrollHeight;
        }

        // Setting Sync
        if(document.getElementById('page-setting').classList.contains('active')) {
            document.getElementById('set-name').value = my.name || '';
            document.getElementById('set-id').value = my.id || '';
            document.getElementById('set-status').value = my.status || '';
            document.getElementById('set-hue').value = my.hue || 260;
        }
    }

    render();
</script>
</body>
</html>

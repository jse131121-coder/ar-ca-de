<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARCADE</title>

<style>
body{
  margin:0;
  background:#cfd9e6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:-apple-system,sans-serif;
}

.phone{
  width:390px;
  height:844px;
  border-radius:40px;
  background:linear-gradient(145deg,#eef2f7,#d9e3ef);
  box-shadow:20px 20px 40px rgba(0,0,0,0.15),
             -10px -10px 30px rgba(255,255,255,0.7);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

header{
  padding:18px;
  font-weight:700;
  display:flex;
  justify-content:space-between;
}

.play{
  background:linear-gradient(135deg,#7b61ff,#5fd0ff);
  color:white;
  padding:8px 16px;
  border-radius:20px;
}

.container{
  flex:1;
  overflow:auto;
  padding:10px;
}

.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.user{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:42px;height:42px;
  border-radius:50%;
  background:#ddd;
  background-size:cover;
}

.bottom{
  height:70px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
}

.chat{display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;}
.me{justify-content:flex-end;}

.bubble{
  padding:10px;
  border-radius:15px;
  max-width:65%;
}

.reply{
  margin-left:20px;
  border-left:2px solid #ccc;
  padding-left:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.grid div{
  aspect-ratio:1;
  border-radius:15px;
  overflow:hidden;
}

.grid img{
  width:100%;
  height:100%;
  object-fit:cover;
}

input,textarea{width:100%;padding:6px;margin-top:5px;}
button{margin-top:5px;}
</style>
</head>

<body>

<div class="phone">

<header>
  ARCADE
  <div class="play" onclick="login()">PLAY</div>
</header>

<div class="container" id="app"></div>

<div class="bottom">
  <div onclick="feed()">Feed</div>
  <div onclick="explore()">Explore</div>
  <div onclick="users()">User</div>
  <div onclick="dmList()">DM</div>
  <div onclick="setting()">Set</div>
</div>

</div>

<script>
let user = JSON.parse(localStorage.getItem("user")) || null;
let usersData = JSON.parse(localStorage.getItem("users")) || [];
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let chats = JSON.parse(localStorage.getItem("chats")) || {};
let currentChat=null;

function save(){
  localStorage.setItem("user",JSON.stringify(user));
  localStorage.setItem("users",JSON.stringify(usersData));
  localStorage.setItem("posts",JSON.stringify(posts));
  localStorage.setItem("chats",JSON.stringify(chats));
}

function toBase64(file,cb){
  const r=new FileReader();
  r.onload=()=>cb(r.result);
  r.readAsDataURL(file);
}

/* 로그인 */
function login(){
  let html=`
  <div class="card">
  <h3>계정 선택</h3>
  ${usersData.map((u,i)=>`
    <div class="user" onclick="selectUser(${i})">
      <div class="avatar" style="background-image:url('${u.avatar||''}')"></div>
      <div><b>${u.name}</b><br>${u.id}</div>
    </div>`).join("")}
  <button onclick="showAddUser()">+ 계정 추가</button>
  </div>`;
  app.innerHTML=html;
}

function selectUser(i){
  user=usersData[i]; save(); feed();
}

function showAddUser(){
  app.innerHTML=`
  <div class="card">
    이름<input id="n">
    아이디<input id="i">
    프사<input type="file" id="a">
    <button onclick="addUser()">생성</button>
  </div>`;
}

function addUser(){
  let f=a.files[0];
  function create(img){
    let u={name:n.value,id:i.value,avatar:img||"",color:"#ffd1dc",msg:""};
    usersData.push(u); user=u; save(); feed();
  }
  if(f) toBase64(f,(d)=>create(d)); else create("");
}

/* FEED */
function feed(){
  let html=`
  <div class="card">
    <input id="t" placeholder="제목">
    <textarea id="c"></textarea>
    <input type="file" id="img">
    <button onclick="addPost()">업로드</button>
  </div>`;

  posts.forEach((p,i)=>{
    html+=`
    <div class="card">
      <div class="user" onclick="profile('${p.user}')">
        <div class="avatar" style="background-image:url('${p.avatar||''}')"></div>
        <b>${p.user}</b>
      </div>
      <b>${p.title}</b>
      <p>${p.content}</p>
      ${p.img?`<img src="${p.img}" style="width:100%;border-radius:15px;">`:''}

      <button onclick="addComment(${i})">댓글</button>

      ${(p.comments||[]).map((c,ci)=>`
        <div>
          💬 ${c.text}
          <button onclick="addReply(${i},${ci})">↩</button>
          ${(c.replies||[]).map(r=>`<div class="reply">↳ ${r}</div>`).join("")}
        </div>`).join("")}
    </div>`;
  });

  app.innerHTML=html;
}

function addPost(){
  let f=img.files[0];
  function push(imgData){
    posts.unshift({
      title:t.value,
      content:c.value,
      img:imgData||"",
      user:user.name,
      avatar:user.avatar,
      comments:[]
    });
    save(); feed();
  }
  if(f) toBase64(f,(d)=>push(d)); else push("");
}

function addComment(i){
  let t=prompt("댓글");
  posts[i].comments.push({text:t,replies:[]});
  save(); feed();
}

function addReply(i,ci){
  let t=prompt("대댓글");
  posts[i].comments[ci].replies.push(t);
  save(); feed();
}

/* EXPLORE */
function explore(){
  app.innerHTML=`
  <div class="grid">
    ${posts.map(p=>`<div>${p.img?`<img src="${p.img}">`:''}</div>`).join("")}
  </div>`;
}

/* USERS */
function users(){
  app.innerHTML=usersData.map(u=>`
    <div class="card user" onclick="profile('${u.name}')">
      <div class="avatar" style="background-image:url('${u.avatar||''}')"></div>
      <div><b>${u.name}</b><br>${u.id}</div>
    </div>`).join("");
}

/* PROFILE */
function profile(name){
  let u=usersData.find(x=>x.name===name);
  let userPosts=posts.filter(p=>p.user===name);

  app.innerHTML=`
  <div class="card">
    <div class="avatar" style="width:70px;height:70px;background-image:url('${u.avatar||''}')"></div>
    <h3>${u.name}</h3>
    <p>${u.msg||''}</p>
    <button onclick="openChat('${u.name}')">DM</button>
  </div>

  ${userPosts.map(p=>`
    <div class="card">
      <b>${p.title}</b>
      <p>${p.content}</p>
      ${p.img?`<img src="${p.img}" style="width:100%">`:''}
    </div>`).join("")}
  `;
}

/* DM LIST */
function dmList(){
  let html=`<div class="card" onclick="createChat()">➕ 채팅 추가</div>`;
  Object.keys(chats).forEach(n=>{
    html+=`<div class="card" onclick="openChat('${n}')">${n}</div>`;
  });
  app.innerHTML=html;
}

function createChat(){
  let html=`<div class="card"><h3>채팅 추가</h3>`;
  usersData.filter(u=>u.name!==user.name).forEach(u=>{
    html+=`
    <div class="user" onclick="startChat('${u.name}')">
      <div class="avatar" style="background-image:url('${u.avatar||''}')"></div>
      <b>${u.name}</b>
    </div>`;
  });
  html+=`</div>`;
  app.innerHTML=html;
}

function startChat(name){
  if(!chats[name]) chats[name]=[];
  save(); openChat(name);
}

function openChat(name){
  currentChat=name;
  let html=`<div class="chat">`;

  (chats[name]||[]).forEach(c=>{
    html+=`
    <div class="msg ${c.me?'me':''}">
      ${!c.me?`<div class="avatar" style="background-image:url('${c.avatar||''}')"></div>`:''}
      <div class="bubble" style="background:${c.me?user.color:'#eee'}">
        ${c.text||''}
        ${c.img?`<img src="${c.img}" style="width:100%;margin-top:5px;border-radius:10px;">`:''}
      </div>
    </div>`;
  });

  html+=`
    <input type="file" id="dmImg">
    <input id="m">
    <button onclick="send()">send</button>
  </div>`;

  app.innerHTML=html;
}

function send(){
  let f=dmImg.files[0];
  if(!chats[currentChat]) chats[currentChat]=[];

  function push(img){
    chats[currentChat].push({
      text:m.value,
      img:img||"",
      me:true,
      avatar:user.avatar
    });
    save(); openChat(currentChat);
  }

  if(f) toBase64(f,(d)=>push(d)); else push("");
}

/* SETTING */
function setting(){
  app.innerHTML=`
  <div class="card">
    프사<input type="file" id="a">
    이름<input id="n" value="${user?.name||''}">
    아이디<input id="i" value="${user?.id||''}">
    상태<input id="s" value="${user?.msg||''}">
    색상<input id="col" value="${user?.color||'#ffd1dc'}">
    <button onclick="saveUser()">저장</button>
  </div>`;
}

function saveUser(){
  let f=a.files[0];

  function apply(img){
    user.name=n.value;
    user.id=i.value;
    user.msg=s.value;
    user.color=col.value;
    if(img) user.avatar=img;
    save(); alert("저장됨");
  }

  if(f) toBase64(f,(d)=>apply(d)); else apply();
}

feed();
</script>

</body>
</html>
